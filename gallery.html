<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Yongling Zhao</title>
<meta name="description" content="Figures from Yongling Zhao's publications on urban climate, heat transfer, and fluid mechanics — and what each reveals.">
<link rel="canonical" href="https://yonglingzhao.com/gallery.html">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0e14'/%3E%3Ctext x='32' y='42' font-family='monospace' font-size='28' font-weight='700' fill='%23ff8a3d' text-anchor='middle'%3EYZ%3C/text%3E%3Cpath d='M10 52c8-6 14 4 22-2s14 2 22-4' stroke='%234cc9f0' stroke-width='2.5' fill='none' stroke-linecap='round' opacity='.85'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg-2:#0f1520; --bg-3:#141c2b;
  --line:rgba(148,163,184,.12); --line-2:rgba(148,163,184,.22);
  --text:#e6edf5; --text-2:#9aa8ba; --text-3:#64748b;
  --accent:#ff8a3d; --accent-2:#ffb86b; --cool:#4cc9f0;
  --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased}
::selection{background:rgba(255,138,61,.3)}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(148,163,184,.045) 1px,transparent 1px),
  linear-gradient(90deg,rgba(148,163,184,.045) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black 30%,transparent 90%);
  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black 30%,transparent 90%);
}
main{position:relative;z-index:1}
nav{position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,14,20,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.nav-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px}
.logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--text);text-decoration:none;letter-spacing:.02em}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--text-2);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--accent)}
.nav-links a.active{color:var(--accent)}
.nav-links a.cta{color:var(--accent);font-family:var(--mono);font-size:13px}
.menu-btn{display:none;background:none;border:1px solid var(--line-2);border-radius:8px;color:var(--text);padding:6px 12px;font-family:var(--mono);font-size:13px;cursor:pointer}

header{padding:140px 24px 20px;max-width:1080px;margin:0 auto;position:relative;z-index:1}
.sec-tag{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:10px;display:block}
h1{font-size:clamp(30px,4.5vw,44px);font-weight:800;letter-spacing:-.02em}
.sub{color:var(--text-2);max-width:640px;margin-top:12px}

.gallery{max-width:1080px;margin:0 auto;padding:44px 24px 90px;columns:2;column-gap:22px}
.fig{border:1px solid var(--line);border-radius:14px;background:var(--bg-2);overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s;break-inside:avoid;margin-bottom:22px}
.fig:hover{border-color:rgba(255,138,61,.45);transform:translateY(-3px)}
.fig img{display:block;width:100%;height:auto;background:#fff}
.fig .cap{padding:18px 20px}
.fig .cap .reveal-line{font-size:15px;font-weight:600;line-height:1.45;letter-spacing:-.01em}
.fig .cap .src{font-family:var(--mono);font-size:11.5px;color:var(--text-3);margin-top:8px}
.fig .cap .src em{color:var(--cool);font-style:italic}
.badge{display:inline-block;font-family:var(--mono);font-size:10.5px;color:#0a0e14;background:var(--accent);border-radius:999px;padding:2px 10px;margin-bottom:10px;letter-spacing:.05em}

/* lightbox */
.lb{position:fixed;inset:0;z-index:200;background:rgba(6,9,14,.94);display:none;align-items:center;justify-content:center;flex-direction:column;padding:40px 24px}
.lb.open{display:flex}
.lb img{max-width:min(1100px,94vw);max-height:72vh;object-fit:contain;border-radius:10px;border:1px solid var(--line-2)}
.lb .lb-cap{max-width:820px;text-align:center;margin-top:22px}
.lb .lb-cap .reveal-line{font-size:17px;font-weight:600}
.lb .lb-cap .src{font-family:var(--mono);font-size:12.5px;color:var(--text-3);margin-top:8px}
.lb .close{position:absolute;top:22px;right:28px;background:none;border:1px solid var(--line-2);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 16px;cursor:pointer}
.lb .close:hover{border-color:var(--accent);color:var(--accent)}

footer{border-top:1px solid var(--line);padding:32px 24px;text-align:center;color:var(--text-3);font-size:13px;font-family:var(--mono);position:relative;z-index:1}
footer a{color:var(--text-2);text-decoration:none}
footer a:hover{color:var(--accent)}

@media(max-width:760px){
  .gallery{columns:1}
}
@media(max-width:860px){
  .nav-links{display:none;position:absolute;top:64px;left:0;right:0;flex-direction:column;gap:0;background:rgba(10,14,20,.97);border-bottom:1px solid var(--line);padding:8px 0}
  .nav-links.open{display:flex}
  .nav-links li{padding:12px 24px}
  .menu-btn{display:block}
}
</style>
</head>
<body>
<div class="grid-bg"></div>

<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">yonglingzhao<span>.</span>com</a>
    <button class="menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('open')">menu</button>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#research">Research</a></li>
      <li><a href="index.html#publications">Publications</a></li>
      <li><a href="index.html#teaching">Teaching</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="index.html#contact" class="cta">→ Contact</a></li>
    </ul>
  </div>
</nav>

<main>
<header>
  <span class="sec-tag">— gallery</span>
  <h1>Figures that tell the story</h1>
  <p class="sub">Selected figures from my publications — each with the one thing it reveals. Click any figure to view it full size.</p>
</header>

<div class="gallery" id="gallery">
  <!--
    TEMPLATE for each figure (copy this block):
    <figure class="fig" data-full="figures/FILENAME.png">
      <img src="figures/FILENAME.png" alt="SHORT DESCRIPTION" loading="lazy">
      <figcaption class="cap">
        <div class="reveal-line">ONE-LINER: what this figure reveals.</div>
        <div class="src">SOURCE: Authors · <em>Journal</em>, Year</div>
      </figcaption>
    </figure>
  -->
  <figure class="fig" data-full="figures/ding2026-cooling-asymmetry.jpg">
    <img src="figures/ding2026-cooling-asymmetry.jpg" alt="Global maps of urban heat exposure and cooling potential across cities worldwide" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">Urban cooling potential is deeply unequal: the cities that need it most have the least.</div>
      <div class="src">Ding X et al. · <em>Nature Communications</em>, 2026</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/zhao2025-nbs-cooling.jpg">
    <img src="figures/zhao2025-nbs-cooling.jpg" alt="Cooling potential and cost of urban parks, water bodies, street trees, green walls, and green roofs" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">From parks to green roofs, nature-based solutions can cool city air by up to 13&nbsp;°C.</div>
      <div class="src">Zhao Y et al. · <em>Annual Review of Environment and Resources</em>, 2025</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/li2024-tree-cooling.jpg">
    <img src="figures/li2024-tree-cooling.jpg" alt="Conceptual illustration of how urban trees moderate the urban heat island effect" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">How much a tree cools its street depends on climate, city form, and the tree itself.</div>
      <div class="src">Li H et al. · <em>Communications Earth &amp; Environment</em>, 2024</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/rottaloria2025-above-below.jpg">
    <img src="figures/rottaloria2025-above-below.jpg" alt="Isometric infographic of urban heat spreading above and below ground through tunnels, sewers, and subsurface infrastructure" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">Urban heat doesn't stop at the street — it sinks into subways, sewers, and basements.</div>
      <div class="src">Rotta Loria AF et al. · <em>Philosophical Transactions of the Royal Society A</em>, 2025</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/zhao2023-beating-heat.jpg">
    <img src="figures/zhao2023-beating-heat.jpg" alt="3D neighbourhood illustration of urban heat mitigation measures: green roofs, reflective roofs, green walls, shading, urban forestry, and indoor cooling" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">There is no single cure for urban heat — cities cool fastest when measures work as a team.</div>
      <div class="src">Zhao Y et al. · <em>Renewable and Sustainable Energy Reviews</em>, 2023</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/zhao2024-heatwave-hysteresis.jpg">
    <img src="figures/zhao2024-heatwave-hysteresis.jpg" alt="Hysteresis loops of boundary-layer height and air temperature before, during, and after heatwaves in Paris, Montreal, and Zurich" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">A heatwave makes the atmosphere above a city breathe harder — rising higher by day, sinking lower by night.</div>
      <div class="src">Zhao Y et al. · <em>Environmental Research Letters</em>, 2024</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/li2023-cooling-demand.jpg">
    <img src="figures/li2023-cooling-demand.jpg" alt="Circular plots of three decades of cooling degree hours in urban and rural areas of Hong Kong, Sydney, Montreal, Zurich, and London" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">Thirty years of air-conditioning bills tell one story: hotter cities need ever more cooling.</div>
      <div class="src">Li H et al. · <em>Environmental Research Letters</em>, 2023</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/jiang2026-6022cities.jpg">
    <img src="figures/jiang2026-6022cities.jpg" alt="Global maps of surface urban heat and land surface temperature across 6022 cities and climate zones" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">The world's fastest-warming cities are overwhelmingly in the Global South — four for every one in the North.</div>
      <div class="src">Jiang S et al. · <em>Remote Sensing of Environment</em>, 2026</div>
    </figcaption>
  </figure>
  <figure class="fig" data-full="figures/li2022-greenwalls-canyons.jpg">
    <img src="figures/li2022-greenwalls-canyons.jpg" alt="3D rendering of buildings clad in green walls within a model city used for wind-tunnel experiments" loading="lazy">
    <figcaption class="cap">
      <div class="reveal-line">Dressing buildings in green cools the street below — a model city in the wind tunnel shows how.</div>
      <div class="src">Li H et al. · <em>Building and Environment</em>, 2022</div>
    </figcaption>
  </figure>
</div>
</main>

<div class="lb" id="lightbox">
  <button class="close" onclick="closeLB()">close ×</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap">
    <div class="reveal-line" id="lb-line"></div>
    <div class="src" id="lb-src"></div>
  </div>
</div>

<footer>
  © <span id="yy"></span> Yongling Zhao · <a href="index.html">yonglingzhao.com</a>
</footer>

<script>
document.getElementById('yy').textContent = new Date().getFullYear();
const lb = document.getElementById('lightbox');
document.querySelectorAll('.fig').forEach(f=>{
  f.addEventListener('click', ()=>{
    const img = f.querySelector('img');
    document.getElementById('lb-img').src = f.dataset.full || img.src;
    document.getElementById('lb-img').alt = img.alt;
    document.getElementById('lb-line').textContent = f.querySelector('.reveal-line').textContent;
    document.getElementById('lb-src').textContent = f.querySelector('.src').textContent;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
});
function closeLB(){ lb.classList.remove('open'); document.body.style.overflow = ''; }
lb.addEventListener('click', e=>{ if(e.target === lb) closeLB(); });
document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeLB(); });
</script>
</body>
</html>
